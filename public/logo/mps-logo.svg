<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 64">
  <!--
    MPS Full Logo — Energy ring icon + "MPS" wordmark
    Icon: glowing orbital ring with swirling trails and particle dispersal
    Text: Space Grotesk with generous tracking
  -->
  <defs>
    <linearGradient id="ring1" gradientUnits="userSpaceOnUse" x1="8" y1="32" x2="56" y2="32">
      <stop offset="0%" stop-color="#d8b4fe"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="trail1" gradientUnits="userSpaceOnUse" x1="12" y1="48" x2="32" y2="12">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="40%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#5b21b6" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="trail2" gradientUnits="userSpaceOnUse" x1="36" y1="8" x2="52" y2="52">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Text gradient: white → whisper of lavender -->
    <linearGradient id="tg" gradientUnits="userSpaceOnUse" x1="84" y1="32" x2="240" y2="32">
      <stop offset="0%" stop-color="#f8f8fc"/>
      <stop offset="80%" stop-color="#f0eef8"/>
      <stop offset="100%" stop-color="#e4e0f0"/>
    </linearGradient>
  </defs>

  <!-- Icon -->
  <g>
    <circle cx="32" cy="32" r="22" fill="none" stroke="#8b5cf6" stroke-width="8" opacity="0.08" filter="url(#glow)"/>
    <g filter="url(#glow)">
      <path d="M 42,11 A 18,18 0 1,1 38,10"
            stroke="url(#ring1)" stroke-width="3" stroke-linecap="round" fill="none"/>
    </g>
    <g filter="url(#glow)">
      <path d="M 14,42 C 8,36 10,22 18,16 C 22,13 28,12 32,14"
            stroke="url(#trail1)" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.7"/>
    </g>
    <g filter="url(#glow)">
      <path d="M 20,50 C 14,46 8,36 12,26"
            stroke="url(#trail1)" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.5"/>
    </g>
    <g filter="url(#glow)">
      <path d="M 42,12 C 46,8 50,10 48,6"
            stroke="url(#trail2)" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.8"/>
      <path d="M 44,14 C 50,12 54,16 52,10"
            stroke="url(#trail2)" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.5"/>
    </g>
    <g filter="url(#softGlow)">
      <circle cx="44" cy="10" r="1.8" fill="#e9d5ff" opacity="0.9"/>
      <circle cx="48" cy="8" r="1" fill="#d8b4fe" opacity="0.7"/>
      <circle cx="40" cy="8" r="0.7" fill="#c4b5fd" opacity="0.6"/>
      <circle cx="50" cy="13" r="0.6" fill="#a78bfa" opacity="0.5"/>
    </g>
    <g filter="url(#softGlow)">
      <circle cx="16" cy="46" r="1.2" fill="#d8b4fe" opacity="0.7"/>
      <circle cx="12" cy="42" r="0.6" fill="#c4b5fd" opacity="0.5"/>
    </g>
  </g>

  <!-- "MPS" wordmark -->
  <style>
    .wordmark {
      font-family: 'Space Grotesk', 'Space Grotesk Variable', system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-weight: 600;
      letter-spacing: 0.16em;
    }
  </style>
  <text class="wordmark" x="72" y="42" font-size="32" fill="url(#tg)">MPS</text>
</svg>
