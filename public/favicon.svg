<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!--
    MPS Favicon — Simplified energy ring at 32x32
    Reduced detail for crisp small-size rendering.
    Dark mode shifts purples lighter for visibility on dark browser chrome.
  -->
  <style>
    .ring { stroke: #a78bfa; }
    .trail { stroke: #8b5cf6; }
    .dot { fill: #e9d5ff; }
    @media (prefers-color-scheme: dark) {
      .ring { stroke: #c4b5fd; }
      .trail { stroke: #a78bfa; }
      .dot { fill: #f3e8ff; }
    }
  </style>

  <!-- Main ring (~300° arc) -->
  <path class="ring" d="M 21,5.5 A 9,9 0 1,1 19,5"
        stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Single swirl trail -->
  <path class="trail" d="M 8,22 C 5,18 6,12 10,9"
        stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>

  <!-- Dispersal particles -->
  <circle class="dot" cx="22" cy="5" r="1.2" opacity="0.9"/>
  <circle class="dot" cx="24" cy="4" r="0.7" opacity="0.6"/>
</svg>
